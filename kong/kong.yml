_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false
  - name: product-service
    url: http://product-service:3002
    routes:
      - name: product-route
        paths:
          - /products
        strip_path: false
  - name: discount-service
    url: http://discount-service:3003
    routes:
      - name: discount-route
        paths:
          - /discounts
        strip_path: false
  - name: order-service
    url: http://order-service:3004
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false
  - name: payment-service
    url: http://payment-service:3005
    routes:
      - name: payment-route
        paths:
          - /payments
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - HEAD
        - PATCH
      credentials: true
