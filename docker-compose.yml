version: '3.8'

services:
  # ============================================================
  # CƠ SỞ DỮ LIỆU & CACHE (ĐANG HOẠT ĐỘNG)
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: zeromall-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zeromall
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeromall"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: zeromall-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  # ============================================================
  # INFRASTRUCTURE (CHƯA SỬ DỤNG — BỎ COMMENT KHI CẦN)
  # ============================================================

  # kafka:
  #   image: apache/kafka:3.7.0
  #   container_name: zeromall-kafka
  #   ports:
  #     - '9092:9092'
  #   restart: always

  # minio:
  #   image: minio/minio:latest
  #   container_name: zeromall-minio
  #   ports:
  #     - '9000:9000'
  #     - '9001:9001'
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   command: server /data --console-address ":9001"
  #   volumes:
  #     - minio_data:/data
  #   restart: always

  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.8.2
  #   container_name: zeromall-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #   ports:
  #     - '9200:9200'
  #     - '9300:9300'
  #   volumes:
  #     - es_data:/usr/share/elasticsearch/data
  #   restart: always

  # ============================================================
  # APPLICATION SERVICES (ĐANG HOẠT ĐỘNG)
  # ============================================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: zeromall-auth-service
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zeromall?schema=auth&options=-csearch_path=auth
      - RUNNING_IN_DOCKER=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: zeromall-product-service
    ports:
      - '3002:3002'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zeromall?schema=product&options=-csearch_path=product
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: zeromall-frontend
    ports:
      - '3000:80'
    depends_on:
      - auth-service
      - product-service
    restart: always

  # ============================================================
  # CÔNG CỤ QUẢN TRỊ
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: zeromall-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zeromall.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: always


volumes:
  postgres_data:
  redis_data:
  # minio_data:
  # es_data:
