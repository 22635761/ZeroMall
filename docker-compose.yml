
services:
  # ============================================================
  # CƠ SỞ DỮ LIỆU & CACHE
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: zeromall-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zeromall
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeromall"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: zeromall-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: zeromall-auth-service
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zeromall?schema=auth&options=-csearch_path=auth
      - RUNNING_IN_DOCKER=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: zeromall-product-service
    ports:
      - '3002:3002'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zeromall?schema=product&options=-csearch_path=product
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: zeromall-frontend
    ports:
      - '3000:80'
    depends_on:
      - auth-service
      - product-service
    restart: always

  # ============================================================
  # CÔNG CỤ QUẢN TRỊ
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: zeromall-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zeromall.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: always


volumes:
  postgres_data:
  redis_data:
